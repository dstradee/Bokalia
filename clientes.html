<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Socios | Bokalia</title>
    <link rel="icon" href="https://raw.githubusercontent.com/dstradee/Bokalia/2ab5ec2e9fa305d65e10b062aaa10ccdbdd0bf76/favicon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#E34F36', secondary1: '#747353', neutral: '#F6E5D3', darkText: '#3B332C' },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>body { font-family: 'Montserrat', sans-serif; background-color: #F6E5D3; color: #3B332C; }</style>
</head>
<body class="bg-neutral text-darkText antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const supabase = supabase.createClient('https://nlzbhbxixjeafvedijst.supabase.co', 'sb_publishable_mbC-1Ahn8tUb9FujRHxxKQ_aYqY-blz');
        const LOGO_URL = "https://raw.githubusercontent.com/dstradee/Bokalia/d8cc49893cad4c9676adc8b35373c2495decdba2/Logosinfondo.png";

        const App = () => {
            const [session, setSession] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [subData, setSubData] = useState(null);
            
            // Estado para crear nueva contraseña
            const [newPassword, setNewPassword] = useState('');
            const [passwordMsg, setPasswordMsg] = useState('');

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setSession(session);
                    if (session) fetchSubData(session.user.id);
                });

                supabase.auth.onAuthStateChange((_event, session) => {
                    setSession(session);
                    if (session) fetchSubData(session.user.id);
                });
            }, []);

            const fetchSubData = async (userId) => {
                const { data, error } = await supabase.from('subscriptions').select('*').eq('id', userId).single();
                if (data) setSubData(data);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert("Error: " + error.message);
                setLoading(false);
            };

            const handleUpdatePassword = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = await supabase.auth.updateUser({ password: newPassword });
                if (error) {
                    setPasswordMsg("Error al guardar: " + error.message);
                } else {
                    setPasswordMsg("¡Contraseña guardada con éxito!");
                    setNewPassword('');
                }
                setLoading(false);
            };

            const handleCheckout = async () => {
                setLoading(true);
                try {
                    const response = await fetch('/api/create-checkout-session', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: session.user.id, email: session.user.email })
                    });
                    const data = await response.json();
                    if(data.url) window.location.href = data.url; 
                    else alert("Error al conectar con Stripe");
                } catch(e) {
                    alert("Error en el servidor");
                }
                setLoading(false);
            };

            if (!session) {
                // PANTALLA DE LOGIN: Completamente Mobile-First
                return (
                    <div className="min-h-screen flex flex-col justify-center items-center p-4">
                        <img src={LOGO_URL} className="h-24 sm:h-28 md:h-36 mb-8 md:mb-10 opacity-90 object-contain drop-shadow-sm" alt="Bokalia" />
                        
                        <div className="bg-white/80 backdrop-blur-md p-6 sm:p-10 rounded-3xl shadow-xl w-full max-w-md border border-white/40">
                            <h2 className="text-xl sm:text-2xl font-bold mb-6 text-center text-darkText">Acceso Socios</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium mb-1 opacity-70">Email personal</label>
                                    <input type="email" value={email} onChange={(e)=>setEmail(e.target.value)} required className="w-full px-4 py-3 rounded-xl bg-neutral/30 border border-darkText/10 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-1 opacity-70">Contraseña (la que has creado)</label>
                                    <input type="password" value={password} onChange={(e)=>setPassword(e.target.value)} required className="w-full px-4 py-3 rounded-xl bg-neutral/30 border border-darkText/10 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition" />
                                </div>
                                <button disabled={loading} className="w-full bg-primary hover:bg-[#c9432c] text-white py-3 rounded-full font-semibold transition shadow-md mt-6">
                                    {loading ? 'Entrando...' : 'Iniciar Sesión'}
                                </button>
                            </form>
                        </div>
                        <a href="index.html" className="mt-8 text-sm opacity-60 hover:opacity-100 transition">Volver a la web</a>
                    </div>
                );
            }

            // PANTALLA DEL DASHBOARD: Ajustes Mobile para que no se amontone nada
            const isActive = subData?.status === 'activa';

            return (
                <div className="min-h-screen pb-20 px-4 sm:px-6">
                    <nav className="bg-white/60 border-b border-darkText/10 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 -mx-4 sm:-mx-6 px-4 sm:px-6 mb-8">
                        <img src={LOGO_URL} className="h-12 md:h-16 object-contain" alt="Bokalia" />
                        <button onClick={() => supabase.auth.signOut()} className="text-sm font-medium opacity-60 hover:text-primary transition">Cerrar Sesión</button>
                    </nav>

                    <div className="max-w-4xl mx-auto mt-6 md:mt-10">
                        <div className="text-center sm:text-left mb-8 md:mb-10">
                            <h1 className="text-2xl md:text-3xl font-bold mb-2">Bienvenido, Gestor.</h1>
                            <p className="text-sm md:text-base text-darkText/70">Conectado como: <span className="font-semibold block sm:inline">{session.user.email}</span></p>
                        </div>

                        <div className="bg-white rounded-2xl md:rounded-3xl p-6 md:p-8 shadow-sm border border-white/50 mb-6 md:mb-8">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b border-darkText/10 pb-6">
                                <div>
                                    <h2 className="text-lg md:text-xl font-bold">Estado del Sistema</h2>
                                    <p className="text-xs md:text-sm opacity-70">Control de tu cuenta Bokalia Socio</p>
                                </div>
                                <span className={`px-4 py-2 rounded-full text-xs md:text-sm font-bold text-white w-full sm:w-auto text-center ${isActive ? 'bg-secondary1' : 'bg-red-500'}`}>
                                    {isActive ? 'SISTEMA ACTIVO' : 'SISTEMA INACTIVO'}
                                </span>
                            </div>

                            {!isActive ? (
                                <div className="bg-neutral/50 p-6 md:p-8 rounded-2xl text-center border border-primary/20">
                                    <h3 className="text-base md:text-lg font-bold text-primary mb-2">Suscripción Requerida</h3>
                                    <p className="text-xs md:text-sm opacity-80 mb-6">Para arrancar el motor de reservas y el sistema operativo de tu local, necesitas activar tu suscripción.</p>
                                    <button onClick={handleCheckout} disabled={loading} className="w-full sm:w-auto bg-primary text-white px-8 py-3 rounded-full font-semibold hover:bg-[#c9432c] transition shadow-lg">
                                        {loading ? 'Conectando con Stripe...' : 'Activar sistema (30 días gratis)'}
                                    </button>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 gap-6">
                                    <div className="p-6 md:p-8 bg-neutral/30 rounded-2xl border border-darkText/5 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                        <div className="w-full md:w-auto text-center sm:text-left">
                                            <h3 className="font-bold mb-2 text-base md:text-lg">Facturación y Suscripción</h3>
                                            <p className="text-xs md:text-sm opacity-70 mb-1">Suscripción recurrente (50€/mes). Al día.</p>
                                            <p className="text-xs opacity-50 mt-2">El historial de facturas está alojado en Stripe. No ocupa espacio en tus bases de datos.</p>
                                        </div>
                                        <a 
                                            href="https://billing.stripe.com/p/login/28E14nfz49W84Ex63M00000" 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="w-full md:w-auto bg-white border border-darkText/10 text-darkText px-6 py-3 md:py-4 rounded-full text-xs md:text-sm text-center font-bold hover:border-primary hover:text-primary transition shadow-sm cursor-pointer"
                                        >
                                            Gestionar / Cancelar Suscripción →
                                        </a>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="bg-white/60 rounded-2xl md:rounded-3xl p-6 md:p-8 shadow-sm border border-white/50">
                            <h2 className="text-lg md:text-xl font-bold mb-2 text-center sm:text-left">Seguridad de tu cuenta</h2>
                            <p className="text-xs md:text-sm opacity-70 mb-6 text-center sm:text-left">Si has accedido mediante una invitación a tu correo personal, establece aquí tu contraseña para poder entrar la próxima vez de forma normal.</p>
                            
                            <form onSubmit={handleUpdatePassword} className="flex flex-col sm:flex-row gap-4 items-stretch sm:items-center">
                                <div className="w-full sm:flex-grow">
                                    <input 
                                        type="password" 
                                        placeholder="Escribe tu nueva contraseña" 
                                        value={newPassword} 
                                        onChange={(e)=>setNewPassword(e.target.value)} 
                                        required 
                                        minLength="6"
                                        className="w-full px-4 py-3 rounded-xl bg-white border border-darkText/10 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition text-sm" 
                                    />
                                </div>
                                <button disabled={loading} className="w-full sm:w-auto whitespace-nowrap bg-darkText text-white px-6 py-3 rounded-xl font-semibold hover:bg-black transition text-sm">
                                    {loading ? 'Guardando...' : 'Guardar Contraseña'}
                                </button>
                            </form>
                            {passwordMsg && <p className="mt-4 text-sm font-bold text-primary text-center sm:text-left">{passwordMsg}</p>}
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
