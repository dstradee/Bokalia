<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokalia | Automatización Premium para Hostelería</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://raw.githubusercontent.com/dstradee/Bokalia/2ab5ec2e9fa305d65e10b062aaa10ccdbdd0bf76/favicon.jpg">
    
    <!-- Fuentes: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E34F36',
                        secondary1: '#747353',
                        secondary2: '#D4A757',
                        neutral: '#F6E5D3',
                        darkText: '#3B332C',
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    backgroundImage: {
                        'bokalia-pattern': "url('data:image/svg+xml,%3Csvg width=\"60\" height=\"60\" viewBox=\"0 0 60 60\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cpath d=\"M54.627 0l.83.83v58.34h-58.34l-.83-.83L54.627 0zM29.627 0l.83.83v28.34h-28.34l-.83-.83L29.627 0z\" fill=\"%23E34F36\" fill-opacity=\"0.03\" fill-rule=\"evenodd\"/%3E%3C/svg%3E')"
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F6E5D3; color: #3B332C; }
        .smooth-shadow { box-shadow: 0 10px 30px rgba(59, 51, 44, 0.05); }
        .glass-panel { background: rgba(246, 229, 211, 0.85); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-neutral text-darkText antialiased bg-bokalia-pattern">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const LOGO_NAV_URL = "https://raw.githubusercontent.com/dstradee/Bokalia/d8cc49893cad4c9676adc8b35373c2495decdba2/Logosinfondo.png";
        const LOGO_MAIN_URL = "https://raw.githubusercontent.com/dstradee/Bokalia/ffbae21866e0c780c814f676ef05c311229b700a/Bokalia%20main%20sin%20fondo.png";

        const PrimaryActionBtn = ({ text, className, onClickAction }) => {
            const handleClick = () => {
                if(onClickAction) {
                    onClickAction();
                } else {
                    window.location.href = 'clientes.html';
                }
            };

            return (
                <button 
                    onClick={handleClick} 
                    className={`relative flex items-center justify-center font-semibold rounded-full transition-all duration-300 bg-primary hover:bg-[#c9432c] hover:shadow-lg hover:-translate-y-1 text-white px-8 py-3 w-full sm:w-auto ${className}`}
                >
                    {text}
                </button>
            );
        };

        const Navbar = () => (
            <nav className="fixed top-0 w-full z-50 glass-panel border-b border-secondary2/20">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between h-20 md:h-24 items-center">
                        <div className="flex-shrink-0 flex items-center h-full py-3">
                            <img className="h-full w-auto object-contain origin-left" src={LOGO_NAV_URL} alt="Bokalia Logo" />
                        </div>
                        <div className="hidden md:flex space-x-8 items-center">
                            <a href="#nosotros" className="text-darkText hover:text-primary transition-colors font-medium">Sobre Nosotros</a>
                            <a href="#features" className="text-darkText hover:text-primary transition-colors font-medium">Servicios</a>
                            <a href="#pricing" className="text-darkText hover:text-primary transition-colors font-medium">Bokalia Socio</a>
                            <PrimaryActionBtn text="Acceso Clientes" className="px-6 py-2 text-sm" />
                        </div>
                    </div>
                </div>
            </nav>
        );

        // FeatureCard ahora ocupa siempre h-full para simetría perfecta
        const FeatureCard = ({ title, description, iconColor, svgPath }) => (
            <div className={`h-full flex flex-col bg-white/60 backdrop-blur-sm p-6 md:p-8 rounded-2xl smooth-shadow border border-white/50 hover:border-${iconColor}/30 transition-all duration-300`}>
                <div className={`w-14 h-14 rounded-2xl mb-6 flex items-center justify-center bg-${iconColor}/10 text-${iconColor}`}>
                    <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d={svgPath}></path></svg>
                </div>
                <h3 className="text-xl font-bold mb-3 text-darkText">{title}</h3>
                <p className="text-darkText/80 font-light leading-relaxed flex-grow">{description}</p>
            </div>
        );

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col font-sans selection:bg-primary selection:text-white">
                    <Navbar />
                    <main className="flex-grow pt-24 pb-12 px-4 sm:px-6 lg:px-8 overflow-hidden">
                        <div className="max-w-7xl mx-auto text-center relative mt-4 md:mt-0">
                            {/* Logo Gigante Responsive */}
                            <div className="relative z-0 -mt-10 sm:-mt-16 md:-mt-32 -mb-8 sm:-mb-16 md:-mb-32">
                                <img src={LOGO_MAIN_URL} alt="Bokalia Main" className="w-full max-w-[800px] h-[250px] sm:h-[350px] md:h-[500px] mx-auto object-contain drop-shadow-sm pointer-events-none" />
                            </div>
                            
                            <div className="relative z-10 px-2">
                                <h1 className="text-4xl sm:text-5xl md:text-7xl font-bold text-darkText mb-6 tracking-tight leading-tight">
                                    La Esencia de tu Local, <br className="hidden sm:block"/><span className="text-primary italic font-serif">Automatizada.</span>
                                </h1>
                                <p className="mt-4 max-w-2xl text-base sm:text-lg md:text-xl text-darkText/70 mx-auto font-light mb-10">
                                    Sistema premium de gestión para hostelería. Simplifica tus reservas, empodera a tu equipo y analiza tus métricas en tiempo real con una interfaz sin ruido visual.
                                </p>
                                <div className="flex justify-center">
                                    <a href="#nosotros" className="text-darkText font-medium hover:text-primary transition-colors border-b border-darkText/20 hover:border-primary pb-1">Conoce Nuestra Filosofía</a>
                                </div>
                            </div>
                            
                            <div className="mt-16 sm:mt-20 relative max-w-5xl mx-auto z-10 px-2">
                                <div className="absolute inset-0 bg-gradient-to-t from-neutral to-transparent z-10"></div>
                                <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&q=80&w=1200" alt="Interior bar" className="rounded-t-3xl shadow-2xl object-cover h-[250px] sm:h-[350px] md:h-[450px] w-full border-t border-x border-white/40" />
                            </div>
                        </div>
                    </main>

                    <section id="nosotros" className="py-16 md:py-24 relative z-20 px-4 sm:px-6 lg:px-8">
                        <div className="max-w-4xl mx-auto text-center md:text-left">
                            <h2 className="text-3xl sm:text-4xl md:text-5xl font-bold text-primary mb-6 md:mb-8 tracking-tight">Tecnología que respeta tu oficio.</h2>
                            <p className="text-lg sm:text-xl md:text-2xl text-darkText leading-relaxed font-light mb-10 md:mb-12">Sabemos perfectamente cómo es un viernes por la noche. El local a pleno rendimiento, el teléfono sonando sin parar, el equipo corriendo y el caos amenazando con desordenar el servicio. Bokalia no nace en una oficina de Silicon Valley, nace pisando la calle y entendiendo la realidad de la hostelería local.</p>
                            <div className="pl-0 md:pl-8 md:border-l-2 md:border-primary/40 mt-8 md:mt-12">
                                <h3 className="text-xl sm:text-2xl md:text-3xl font-bold text-primary mb-6">Nuestro objetivo es simple: Devolverte el control.</h3>
                                <div className="space-y-6 text-base sm:text-lg text-darkText/80 font-light leading-relaxed">
                                    <p>No queremos cambiar la esencia de tu negocio ni complicarle la vida a tus camareros con curvas de aprendizaje interminables. Desarrollamos herramientas invisibles pero potentes. Queremos que dejes de perder tiempo apuntando nombres en libretas, que tus zonas de reservado estén gestionadas al milímetro y que los clientes fantasma no te hagan perder dinero.</p>
                                    <p className="font-medium text-darkText text-lg sm:text-xl italic pt-4">Tú pones el alma y el buen servicio. Nosotros ponemos el orden para que todo funcione como un reloj.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="features" className="py-16 md:py-24 relative z-20">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-12 md:mb-16">
                                <h2 className="text-3xl md:text-4xl font-bold text-darkText mb-4">Herramientas Diseñadas con Propósito</h2>
                            </div>
                            {/* Grid que fuerza la misma altura (h-full en los hijos) */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6 md:gap-8 items-stretch">
                                <FeatureCard title="Reservas en Tiempo Real" description="Motor de reservas inteligente que sincroniza la disponibilidad de mesas al instante." iconColor="primary" svgPath="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                <FeatureCard title="Menú Interactivo" description="Carta digital minimalista en los dispositivos de tus clientes." iconColor="secondary2" svgPath="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                                <FeatureCard title="Panel para Camareros" description="Interfaz mobile-first ultra rápida para entornos de poca luz." iconColor="secondary1" svgPath="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                                <FeatureCard title="Métricas Manager" description="Dashboard analítico sin ruido visual." iconColor="darkText" svgPath="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                            </div>
                        </div>
                    </section>

                    <section id="pricing" className="py-16 md:py-24 relative bg-white/40 px-4">
                        <div className="max-w-4xl mx-auto text-center">
                            <div className="bg-white rounded-3xl p-6 md:p-14 smooth-shadow border border-secondary2/30 relative overflow-hidden">
                                <div className="absolute top-0 right-0 bg-secondary2 text-white text-xs font-bold px-4 py-1 rounded-bl-lg">EXCLUSIVO</div>
                                <div className="flex flex-col md:flex-row justify-between items-center text-left">
                                    <div className="mb-8 md:mb-0 text-center md:text-left w-full md:w-1/2">
                                        <h3 className="text-2xl font-bold mb-2 text-primary">Bokalia Socio</h3>
                                        <p className="text-darkText/70 font-light">El modelo integral para locales asociados a la plataforma.</p>
                                    </div>
                                    <div className="bg-neutral/30 p-6 md:p-8 rounded-2xl w-full md:w-auto flex flex-col items-center md:items-end">
                                        <div className="text-4xl md:text-5xl font-bold text-darkText mb-4">50€<span className="text-base md:text-lg text-darkText/50 font-normal">/mes</span></div>
                                        <PrimaryActionBtn text="Solicitar Acceso" className="w-full" onClickAction={() => window.location.href = "mailto:bokaliaa@hotmail.com?subject=Solicitud de Acceso - Bokalia Socio"} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="border-t border-darkText/10 bg-white/60 pt-12 pb-8 mt-auto px-4">
                        <div className="max-w-7xl mx-auto flex flex-col items-center">
                            <img className="h-10 w-auto mb-4 opacity-80 grayscale" src={LOGO_NAV_URL} alt="Bokalia Logo" />
                            <p className="text-xs sm:text-sm text-darkText/40 text-center">© 2026 Bokalia. Tecnología que respeta tu oficio.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
