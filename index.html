<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokalia | Agencia de Digitalización y Automatización</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://raw.githubusercontent.com/dstradee/Bokalia/2ab5ec2e9fa305d65e10b062aaa10ccdbdd0bf76/favicon.jpg">
    
    <!-- Fuentes: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E34F36',
                        secondary1: '#747353',
                        secondary2: '#D4A757',
                        neutral: '#F6E5D3',
                        darkText: '#3B332C',
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    backgroundImage: {
                        'bokalia-pattern': "url('data:image/svg+xml,%3Csvg width=\"60\" height=\"60\" viewBox=\"0 0 60 60\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cpath d=\"M54.627 0l.83.83v58.34h-58.34l-.83-.83L54.627 0zM29.627 0l.83.83v28.34h-28.34l-.83-.83L29.627 0z\" fill=\"%23E34F36\" fill-opacity=\"0.03\" fill-rule=\"evenodd\"/%3E%3C/svg%3E')"
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F6E5D3; color: #3B332C; }
        .smooth-shadow { box-shadow: 0 10px 30px rgba(59, 51, 44, 0.05); }
        .glass-panel { background: rgba(246, 229, 211, 0.9); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-neutral text-darkText antialiased bg-bokalia-pattern">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const LOGO_NAV_URL = "https://raw.githubusercontent.com/dstradee/Bokalia/d8cc49893cad4c9676adc8b35373c2495decdba2/Logosinfondo.png";
        const LOGO_MAIN_URL = "https://raw.githubusercontent.com/dstradee/Bokalia/ffbae21866e0c780c814f676ef05c311229b700a/Bokalia%20main%20sin%20fondo.png";

        const PrimaryActionBtn = ({ text, className, onClickAction }) => {
            const handleClick = () => {
                if(onClickAction) {
                    onClickAction();
                } else {
                    window.location.href = 'clientes.html';
                }
            };

            return (
                <button 
                    onClick={handleClick} 
                    className={`relative flex items-center justify-center font-semibold rounded-full transition-all duration-300 bg-primary hover:bg-[#c9432c] hover:shadow-lg hover:-translate-y-1 text-white px-8 py-3 w-full sm:w-auto ${className}`}
                >
                    {text}
                </button>
            );
        };

        const Navbar = () => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            return (
                <nav className="fixed top-0 w-full z-50 glass-panel border-b border-secondary2/20">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-20 md:h-24 items-center">
                            <div className="flex-shrink-0 flex items-center h-full py-3">
                                <img className="h-full w-auto object-contain origin-left" src={LOGO_NAV_URL} alt="Bokalia Logo" />
                            </div>
                            
                            {/* Menú Escritorio */}
                            <div className="hidden md:flex space-x-8 items-center">
                                <a href="#nosotros" className="text-darkText hover:text-primary transition-colors font-medium">Filosofía</a>
                                <a href="#features" className="text-darkText hover:text-primary transition-colors font-medium">Soluciones</a>
                                <a href="#pricing" className="text-darkText hover:text-primary transition-colors font-medium">Bokalia Socio</a>
                                <PrimaryActionBtn text="Acceso Clientes" className="px-6 py-2 text-sm" />
                            </div>

                            {/* Botón Menú Hamburguesa (Móvil) */}
                            <div className="md:hidden flex items-center">
                                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-darkText hover:text-primary focus:outline-none p-2">
                                    <svg className="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        {isMobileMenuOpen ? (
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                                        ) : (
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" />
                                        )}
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Desplegable Menú Móvil */}
                    {isMobileMenuOpen && (
                        <div className="md:hidden bg-neutral/95 backdrop-blur-md border-b border-secondary2/20 px-6 pt-4 pb-8 shadow-2xl absolute w-full left-0 top-full">
                            <div className="flex flex-col space-y-6">
                                <a href="#nosotros" onClick={() => setIsMobileMenuOpen(false)} className="text-darkText font-bold text-lg hover:text-primary transition-colors">Filosofía</a>
                                <a href="#features" onClick={() => setIsMobileMenuOpen(false)} className="text-darkText font-bold text-lg hover:text-primary transition-colors">Soluciones</a>
                                <a href="#pricing" onClick={() => setIsMobileMenuOpen(false)} className="text-darkText font-bold text-lg hover:text-primary transition-colors">Bokalia Socio</a>
                                <div className="pt-4 border-t border-darkText/10">
                                    <PrimaryActionBtn text="Acceso Clientes" className="w-full" />
                                </div>
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        const FeatureCard = ({ title, description, iconColor, svgPath, isFullWidth = false }) => (
            <div className={`h-full flex flex-col bg-white/60 backdrop-blur-sm p-6 md:p-8 rounded-2xl smooth-shadow border border-white/50 hover:border-${iconColor}/30 transition-all duration-300 ${isFullWidth ? 'md:col-span-2' : ''}`}>
                <div className={`w-14 h-14 rounded-2xl mb-6 flex items-center justify-center bg-${iconColor}/10 text-${iconColor} ${isFullWidth ? 'mx-auto md:mx-0' : ''}`}>
                    <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d={svgPath}></path></svg>
                </div>
                <h3 className={`text-xl font-bold mb-3 text-darkText ${isFullWidth ? 'text-center md:text-left' : ''}`}>{title}</h3>
                <p className={`text-darkText/80 font-light leading-relaxed flex-grow ${isFullWidth ? 'text-center md:text-left text-lg' : ''}`}>{description}</p>
            </div>
        );

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col font-sans selection:bg-primary selection:text-white">
                    <Navbar />
                    <main className="flex-grow pt-24 pb-12 px-4 sm:px-6 lg:px-8 overflow-hidden">
                        <div className="max-w-7xl mx-auto text-center relative mt-4 md:mt-0">
                            {/* Logo Gigante Responsive */}
                            <div className="relative z-0 -mt-10 sm:-mt-16 md:-mt-32 -mb-8 sm:-mb-16 md:-mb-32">
                                <img src={LOGO_MAIN_URL} alt="Bokalia Main" className="w-full max-w-[800px] h-[250px] sm:h-[350px] md:h-[500px] mx-auto object-contain drop-shadow-sm pointer-events-none" />
                            </div>
                            
                            <div className="relative z-10 px-2">
                                <h1 className="text-4xl sm:text-5xl md:text-7xl font-bold text-darkText mb-6 tracking-tight leading-tight">
                                    La Esencia de tu Negocio, <br className="hidden sm:block"/><span className="text-primary italic font-serif">Automatizada.</span>
                                </h1>
                                <p className="mt-4 max-w-2xl text-base sm:text-lg md:text-xl text-darkText/70 mx-auto font-light mb-10">
                                    Agencia de digitalización a medida para negocios locales. Si tu empresa tiene un cuello de botella operativo o de ventas, nosotros programamos la solución tecnológica.
                                </p>
                                <div className="flex justify-center">
                                    <a href="#nosotros" className="text-darkText font-medium hover:text-primary transition-colors border-b border-darkText/20 hover:border-primary pb-1">Conoce Nuestra Filosofía</a>
                                </div>
                            </div>
                            
                            {/* NUEVA FOTO: Portátil en mesa de madera cálida */}
                            <div className="mt-16 sm:mt-20 relative max-w-5xl mx-auto z-10 px-2">
                                <div className="absolute inset-0 bg-gradient-to-t from-neutral to-transparent z-10"></div>
                                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&q=80&w=1200" alt="Programación a medida para locales" className="rounded-t-3xl shadow-2xl object-cover h-[250px] sm:h-[350px] md:h-[450px] w-full border-t border-x border-white/40" />
                            </div>
                        </div>
                    </main>

                    <section id="nosotros" className="py-16 md:py-24 relative z-20 px-4 sm:px-6 lg:px-8">
                        <div className="max-w-4xl mx-auto text-center md:text-left">
                            <h2 className="text-3xl sm:text-4xl md:text-5xl font-bold text-primary mb-6 md:mb-8 tracking-tight">Tecnología que respeta tu oficio.</h2>
                            <p className="text-lg sm:text-xl md:text-2xl text-darkText leading-relaxed font-light mb-10 md:mb-12">
                                Sabemos lo que es el caos. El teléfono del bufete sonando sin parar, el control de visitas de una inmobiliaria perdiéndose en papeles, o el estrés del viernes noche en tu local. Bokalia no nace en una oficina de Silicon Valley, nace pisando la calle y entendiendo la realidad de los negocios locales.
                            </p>
                            <div className="pl-0 md:pl-8 md:border-l-2 md:border-primary/40 mt-8 md:mt-12">
                                <h3 className="text-xl sm:text-2xl md:text-3xl font-bold text-primary mb-6">Nuestro objetivo es simple: Devolverte el control.</h3>
                                <div className="space-y-6 text-base sm:text-lg text-darkText/80 font-light leading-relaxed">
                                    <p>No queremos cambiar la esencia de tu empresa ni complicarle la vida a tus empleados con curvas de aprendizaje interminables. Desarrollamos herramientas invisibles pero potentes. Sean portales inmobiliarios, agendas legales, sistemas de delivery de barrio o automatización de burocracia.</p>
                                    <p className="font-medium text-darkText text-lg sm:text-xl italic pt-4">Tú pones el alma y el buen servicio. Nosotros ponemos el código para que todo funcione como un reloj.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="features" className="py-16 md:py-24 relative z-20">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-12 md:mb-16">
                                <h2 className="text-3xl md:text-4xl font-bold text-darkText mb-4">Catálogo de Soluciones por Nicho</h2>
                                <p className="text-darkText/70 max-w-2xl mx-auto font-light text-lg">Soluciones específicas diseñadas para resolver los problemas reales de cada sector.</p>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 items-stretch">
                                <FeatureCard 
                                    title="1. Inmobiliarias" 
                                    description="Portales integrales. Subida de propiedades a bases de datos en tiempo real y Panel/CRM inteligente donde llegan los contactos y reservas de visitas de tus clientes." 
                                    iconColor="primary" 
                                    svgPath="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
                                />
                                
                                <FeatureCard 
                                    title="2. Bufetes de Abogados" 
                                    description="Sistemas de reservas de consultas profesionales. Digitalizamos la agenda de tu despacho para que el cliente reserve online, eliminando el colapso telefónico." 
                                    iconColor="secondary2" 
                                    svgPath="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                                />
                                
                                <FeatureCard 
                                    title="3. Tiendas Locales" 
                                    description="Webs ágiles para pequeños comercios. Gestión de pedidos a domicilio o encargos personalizados. Tu cliente pide, tú lo recibes en tu panel listo para preparar." 
                                    iconColor="secondary1" 
                                    svgPath="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
                                />
                                
                                <FeatureCard 
                                    title="4. Hostelería y Tatuajes" 
                                    description="Nuestro core base. Motor de reservas de mesas/citas, paneles de camarero, menús interactivos QR y automatización de burocracia (como firmas BOJA en PDF automático)." 
                                    iconColor="darkText" 
                                    svgPath="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"
                                />

                                <FeatureCard 
                                    title="5. Adaptabilidad Total (Desarrollo bajo demanda)" 
                                    description="Bokalia es un sistema vivo. Hacemos trajes a medida. Si nos dices 'necesito una función específica para rellenar este documento' o 'necesito que la web haga esta acción concreta', programamos y añadimos ese módulo exclusivo a tu panel." 
                                    iconColor="primary" 
                                    isFullWidth={true}
                                    svgPath="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
                                />
                            </div>
                        </div>
                    </section>

                    <section id="pricing" className="py-16 md:py-24 relative bg-white/40 px-4">
                        <div className="max-w-4xl mx-auto text-center">
                            <div className="bg-white rounded-3xl p-6 md:p-14 smooth-shadow border border-secondary2/30 relative overflow-hidden">
                                <div className="absolute top-0 right-0 bg-secondary2 text-white text-xs font-bold px-4 py-1 rounded-bl-lg">EXCLUSIVO</div>
                                <div className="flex flex-col md:flex-row justify-between items-center text-left">
                                    <div className="mb-8 md:mb-0 text-center md:text-left w-full md:w-1/2">
                                        <h3 className="text-2xl font-bold mb-2 text-primary">Bokalia Socio</h3>
                                        <p className="text-darkText/70 font-light mb-4">El modelo integral de digitalización y desarrollo a medida para empresas locales.</p>
                                        <ul className="space-y-2 text-sm text-darkText/80 hidden md:block">
                                            <li>✓ Soluciones específicas por nicho</li>
                                            <li>✓ Bases de datos y CRM en tiempo real</li>
                                            <li>✓ Mantenimiento y soporte técnico directo</li>
                                        </ul>
                                    </div>
                                    <div className="bg-neutral/30 p-6 md:p-8 rounded-2xl w-full md:w-auto flex flex-col items-center md:items-end">
                                        <div className="text-4xl md:text-5xl font-bold text-darkText mb-4">50€<span className="text-base md:text-lg text-darkText/50 font-normal">/mes</span></div>
                                        <PrimaryActionBtn text="Solicitar Presupuesto" className="w-full" onClickAction={() => window.location.href = "mailto:bokaliaa@hotmail.com?subject=Solicitud de Digitalización - Bokalia Socio"} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="border-t border-darkText/10 bg-white/60 pt-12 pb-8 mt-auto px-4">
                        <div className="max-w-7xl mx-auto flex flex-col items-center">
                            <img className="h-10 w-auto mb-4 opacity-80 grayscale" src={LOGO_NAV_URL} alt="Bokalia Logo" />
                            <p className="text-xs sm:text-sm text-darkText/40 text-center">© 2026 Bokalia. Tecnología que respeta tu oficio.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
